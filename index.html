<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陳澄波・生命地圖｜3D 藝術人生特別節目</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230b1626'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%23e3b04b'/%3E%3C/svg%3E">
<style>
:root{
  --night:#0b1626;
  --gold:#e3b04b;
  --gold-soft:#f0cf8a;
  --brick:#b4543a;
  --pine:#3e6b52;
  --canvas:#f1e6cf;
  --ink:#131015;
  --mist:#6d7f96;
  --panel:rgba(13,22,38,.82);
  --panel-line:rgba(227,176,75,.35);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--night)}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;color:var(--canvas)}
#stage{position:fixed;inset:0;cursor:grab}
#stage.grabbing{cursor:grabbing}
canvas{display:block}

/* ---------- 開場字卡 ---------- */
#intro{
  position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(ellipse at 50% 40%, #16273f 0%, #0b1626 62%, #070d18 100%);
  transition:opacity 1.2s ease;padding:24px;
}
#intro.hide{opacity:0;pointer-events:none}
.intro-eyebrow{
  font-size:12px;letter-spacing:.55em;text-indent:.55em;color:var(--gold);
  border:1px solid var(--panel-line);padding:8px 14px 8px 20px;border-radius:2px;margin-bottom:26px;
}
.intro-title{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-weight:900;
  font-size:clamp(40px,9vw,84px);line-height:1.15;letter-spacing:.12em;
  background:linear-gradient(160deg,#f7e3ae 15%,#e3b04b 55%,#9c6f22 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 60px rgba(227,176,75,.15);
}
.intro-sub{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:clamp(14px,3vw,19px);
  letter-spacing:.32em;text-indent:.32em;margin-top:18px;color:#c9b98f;
}
.intro-years{font-size:13px;letter-spacing:.4em;text-indent:.4em;color:var(--mist);margin-top:10px}
#startBtn{
  margin-top:44px;font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:17px;letter-spacing:.3em;text-indent:.3em;
  color:var(--night);background:linear-gradient(160deg,#f0cf8a,#d9a53f);
  border:none;padding:15px 40px 15px 46px;border-radius:3px;cursor:pointer;
  box-shadow:0 0 34px rgba(227,176,75,.35);transition:transform .2s ease, box-shadow .2s ease;
}
#startBtn:hover{transform:translateY(-2px);box-shadow:0 6px 44px rgba(227,176,75,.5)}
#startBtn:focus-visible{outline:2px solid var(--canvas);outline-offset:3px}
.intro-hint{margin-top:20px;font-size:12px;color:var(--mist);letter-spacing:.15em}

/* ---------- 頂部時間軸 ---------- */
#timeline{
  position:fixed;top:0;left:0;right:0;z-index:30;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
  background:linear-gradient(to bottom, rgba(7,13,24,.9), rgba(7,13,24,0));
  display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;
  opacity:0;transition:opacity .8s ease;
}
#timeline.show{opacity:1}
#timeline::-webkit-scrollbar{display:none}
.tl-node{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--mist);
  font-family:inherit;transition:color .3s;
}
.tl-node .dot{width:9px;height:9px;border-radius:50%;background:#37455c;border:1px solid #55688a;transition:all .3s}
.tl-node .yr{font-size:11px;letter-spacing:.08em;white-space:nowrap}
.tl-node.done .dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(227,176,75,.6)}
.tl-node.done{color:#cbb277}
.tl-node.active .dot{background:var(--gold-soft);border-color:#fff;transform:scale(1.5);box-shadow:0 0 14px rgba(240,207,138,.9)}
.tl-node.active{color:var(--canvas)}
.tl-line{flex:0 0 22px;height:1px;background:rgba(109,127,150,.4)}
.tl-node:focus-visible{outline:1px solid var(--gold);border-radius:4px}

/* ---------- 能力值面板 ---------- */
#stats{
  position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:25;width:172px;
  background:var(--panel);border:1px solid var(--panel-line);border-radius:6px;
  padding:14px 14px 12px;backdrop-filter:blur(8px);
  opacity:0;transition:opacity .8s ease;
}
#stats.show{opacity:1}
#stats h3{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:12px;letter-spacing:.35em;text-indent:.35em;
  color:var(--gold);margin-bottom:10px;text-align:center;
}
.stat{margin-bottom:9px}
.stat:last-child{margin-bottom:0}
.stat .lab{display:flex;justify-content:space-between;font-size:11px;color:#c8bfa8;margin-bottom:3px;letter-spacing:.05em}
.stat .lab .num{color:var(--gold-soft);font-variant-numeric:tabular-nums}
.stat .bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.stat .fill{height:100%;width:0%;border-radius:3px;transition:width 1.1s cubic-bezier(.22,1,.36,1)}
.stat.up .lab .num::after{content:" ▲";font-size:9px;color:#8fd6a5}
.f-belief{background:linear-gradient(90deg,#c98f2e,#f0cf8a)}
.f-land{background:linear-gradient(90deg,#7a4a2e,#c9805a)}
.f-exp{background:linear-gradient(90deg,#3a6ea5,#8fc3e8)}
.f-public{background:linear-gradient(90deg,#3e6b52,#8fd6a5)}
.f-risk{background:linear-gradient(90deg,#7e2f2f,#d96a5a)}
.f-legacy{background:linear-gradient(90deg,#6a4b9c,#c3a6f0)}
#statsToggle{display:none}

/* ---------- 底部敘事卡 ---------- */
#narr{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 76px);transform:translateX(-50%);
  z-index:26;width:min(660px,calc(100% - 24px));
  background:var(--panel);border:1px solid var(--panel-line);border-radius:8px;
  padding:16px 18px 14px;backdrop-filter:blur(10px);
  opacity:0;translate:0 14px;transition:opacity .7s ease, translate .7s ease;
  max-height:38vh;overflow-y:auto;
}
#narr.show{opacity:1;translate:0 0}
.narr-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.narr-year{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-weight:900;font-size:22px;color:var(--gold);
  letter-spacing:.05em;line-height:1;
}
.narr-title{font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-weight:700;font-size:18px;letter-spacing:.12em}
.narr-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{
  font-size:10.5px;color:#d8c491;border:1px solid rgba(227,176,75,.4);
  padding:2px 8px;border-radius:20px;letter-spacing:.08em;
}
.narr-body{font-size:13.5px;line-height:1.85;color:#e6dcc4;letter-spacing:.03em}
.narr-seal{
  display:inline-block;margin-top:8px;font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-weight:900;
  color:#f7e9c6;background:linear-gradient(160deg,#a3341f,#7e2416);
  border:2px solid #e3b04b;border-radius:4px;padding:6px 12px;font-size:13px;letter-spacing:.2em;
  box-shadow:0 0 24px rgba(227,176,75,.35);
}
.consequence{
  margin-top:10px;padding:9px 12px;border-left:3px solid var(--gold);
  background:rgba(227,176,75,.08);font-size:12.5px;line-height:1.8;color:#f0e6c8;border-radius:0 4px 4px 0;
}
.alt-note{
  margin-top:10px;padding:9px 12px;border-left:3px solid var(--mist);
  background:rgba(109,127,150,.12);font-size:12.5px;line-height:1.8;color:#c4cede;border-radius:0 4px 4px 0;
}

/* ---------- 抉擇 ---------- */
#choiceWrap{margin-top:12px;display:none}
#choiceWrap.show{display:block}
.choice-label{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:13px;color:var(--gold);letter-spacing:.25em;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.choice-label::before,.choice-label::after{content:"";flex:1;height:1px;background:rgba(227,176,75,.35)}
.choice-btns{display:flex;gap:8px;flex-wrap:wrap}
.choice-btn{
  flex:1;min-width:150px;font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:13.5px;letter-spacing:.06em;
  color:var(--canvas);background:rgba(255,255,255,.05);border:1px solid rgba(227,176,75,.45);
  border-radius:5px;padding:11px 12px;cursor:pointer;line-height:1.6;transition:all .25s;
}
.choice-btn:hover{background:rgba(227,176,75,.14);transform:translateY(-1px)}
.choice-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.choice-btn.chosen{background:linear-gradient(160deg,rgba(227,176,75,.3),rgba(227,176,75,.12));border-color:var(--gold);box-shadow:0 0 18px rgba(227,176,75,.25)}
.choice-btn:disabled{opacity:.45;cursor:default;transform:none}

/* ---------- 底部控制列 ---------- */
#controls{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 14px);transform:translateX(-50%);
  z-index:28;display:flex;gap:8px;align-items:center;
  opacity:0;transition:opacity .8s ease;
}
#controls.show{opacity:1}
.ctl{
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei','Heiti TC',sans-serif;font-size:13px;letter-spacing:.12em;
  color:var(--canvas);background:var(--panel);border:1px solid var(--panel-line);
  border-radius:24px;padding:10px 18px;cursor:pointer;backdrop-filter:blur(8px);
  transition:all .25s;white-space:nowrap;
}
.ctl:hover:not(:disabled){background:rgba(227,176,75,.16)}
.ctl:disabled{opacity:.35;cursor:default}
.ctl.primary{background:linear-gradient(160deg,#e9c268,#c8963a);color:#1c1508;font-weight:700;border-color:transparent}
.ctl.primary:hover:not(:disabled){box-shadow:0 0 22px rgba(227,176,75,.45)}
.ctl.on{border-color:var(--gold);color:var(--gold-soft);box-shadow:inset 0 0 12px rgba(227,176,75,.15)}
.ctl:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

#freeHint{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 58px);left:50%;transform:translateX(-50%);
  z-index:24;font-size:11.5px;letter-spacing:.12em;color:#bfc9da;
  background:rgba(13,22,38,.7);border:1px solid rgba(109,127,150,.35);border-radius:20px;
  padding:6px 14px;opacity:0;transition:opacity .5s;pointer-events:none;backdrop-filter:blur(6px);
}
#freeHint.show{opacity:1}

/* ---------- 結尾旁白 ---------- */
#finale{
  position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  pointer-events:none;padding:28px;
}
#finale.show{display:flex}
.finale-card{
  max-width:640px;text-align:center;
  background:rgba(9,14,24,.55);border-top:1px solid rgba(227,176,75,.5);border-bottom:1px solid rgba(227,176,75,.5);
  padding:34px 26px;backdrop-filter:blur(4px);
  opacity:0;transition:opacity 2.2s ease;
}
.finale-card.on{opacity:1}
.finale-card p{
  font-family:'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','MingLiU',serif;font-size:clamp(15px,3.4vw,20px);line-height:2.2;
  letter-spacing:.14em;color:#f4ead0;text-shadow:0 2px 18px rgba(0,0,0,.6);
}
.finale-card .sig{
  margin-top:20px;font-size:12px;letter-spacing:.45em;text-indent:.45em;color:var(--gold);
}

/* ---------- 響應式 ---------- */
@media (max-width:760px){
  #stats{width:146px;left:8px;padding:11px 11px 9px;top:auto;bottom:auto;top:50%}
  #stats h3{font-size:11px;margin-bottom:8px}
  .stat .lab{font-size:10px}
  #narr{bottom:calc(env(safe-area-inset-bottom,0px) + 70px);max-height:34vh;padding:13px 14px 12px}
  .narr-year{font-size:19px}
  .narr-title{font-size:16px}
  .narr-body{font-size:12.5px;line-height:1.75}
  .ctl{padding:9px 14px;font-size:12px}
  #statsToggle{
    display:block;position:fixed;left:8px;top:calc(env(safe-area-inset-top,0px) + 54px);z-index:27;
    font-size:11px;color:var(--gold-soft);background:var(--panel);border:1px solid var(--panel-line);
    border-radius:16px;padding:6px 12px;letter-spacing:.1em;
  }
  #stats.collapsed{opacity:0;pointer-events:none}
}
@media (prefers-reduced-motion:reduce){
  *{transition-duration:.01s !important}
}
</style>
</head>
<body>

<div id="stage"></div>

<!-- 開場 -->
<div id="intro">
  <div class="intro-eyebrow">3D 生命地圖・藝術人生特別節目</div>
  <h1 class="intro-title">陳澄波</h1>
  <div class="intro-sub">在時代裂縫中發光的臺灣畫家</div>
  <div class="intro-years">1895 — 1947</div>
  <button id="startBtn">開啟生命地圖</button>
  <div class="intro-hint">拖曳旋轉鏡頭・雙指或滾輪縮放・沿時間軸展開一生</div>
</div>

<!-- 時間軸 -->
<nav id="timeline" aria-label="生命時間軸"></nav>
<button id="statsToggle">能力值</button>

<!-- 能力值面板 -->
<aside id="stats" aria-label="生命能力值">
  <h3>生命能力值</h3>
  <div class="stat" data-k="belief"><div class="lab"><span>藝術信念</span><span class="num">0</span></div><div class="bar"><div class="fill f-belief"></div></div></div>
  <div class="stat" data-k="land"><div class="lab"><span>土地情感</span><span class="num">0</span></div><div class="bar"><div class="fill f-land"></div></div></div>
  <div class="stat" data-k="exp"><div class="lab"><span>創作實驗</span><span class="num">0</span></div><div class="bar"><div class="fill f-exp"></div></div></div>
  <div class="stat" data-k="public"><div class="lab"><span>公共參與</span><span class="num">0</span></div><div class="bar"><div class="fill f-public"></div></div></div>
  <div class="stat" data-k="risk"><div class="lab"><span>時代風險</span><span class="num">0</span></div><div class="bar"><div class="fill f-risk"></div></div></div>
  <div class="stat" data-k="legacy"><div class="lab"><span>文化影響力</span><span class="num">0</span></div><div class="bar"><div class="fill f-legacy"></div></div></div>
</aside>

<!-- 敘事卡 -->
<section id="narr" aria-live="polite">
  <div class="narr-head">
    <div class="narr-year" id="nYear"></div>
    <div class="narr-title" id="nTitle"></div>
  </div>
  <div class="narr-tags" id="nTags"></div>
  <div class="narr-body" id="nBody"></div>
  <div id="nSeal"></div>
  <div id="nResult"></div>
  <div id="choiceWrap">
    <div class="choice-label">人生抉擇</div>
    <div class="choice-btns" id="choiceBtns"></div>
  </div>
</section>

<!-- 控制列 -->
<div id="controls">
  <button class="ctl" id="prevBtn">◀ 上一站</button>
  <button class="ctl" id="freeBtn">自由運鏡</button>
  <button class="ctl primary" id="nextBtn">下一站 ▶</button>
</div>
<div id="freeHint">自由運鏡中—拖曳旋轉・滾輪／雙指縮放</div>

<!-- 結尾 -->
<div id="finale">
  <div class="finale-card" id="finaleCard">
    <p>「陳澄波的一生，不只是畫家的成長史，<br>也是臺灣近代美術在時代裂縫中發光的歷程。<br>人的一生會被選擇推動，也會被時代改寫；<br>但真正深刻的創作，會在生命結束後，<br>繼續替土地發聲。」</p>
    <div class="sig">生命地圖・終章</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

var landCenters = [
  // 臺灣（南北向長島）
  {x:-30,z:-2,r:16,h:3.2},{x:-31,z:8,r:15,h:3.6},{x:-32,z:18,r:15,h:3.4},
  {x:-33,z:27,r:14,h:3.0},{x:-29,z:-10,r:12,h:2.6},
  {x:-36,z:12,r:7,h:6.5},{x:-35,z:20,r:6,h:5.5}, // 中央山脈
  // 日本（東京一帶）
  {x:85,z:-45,r:17,h:3.0},{x:95,z:-55,r:14,h:2.8},{x:74,z:-36,r:10,h:2.4},{x:90,z:-48,r:6,h:5.0},
  // 上海／大陸海岸
  {x:-75,z:-55,r:18,h:2.6},{x:-92,z:-48,r:22,h:3.0},{x:-88,z:-70,r:18,h:2.8},{x:-104,z:-60,r:20,h:3.2}
];
function heightAt(x,z){
  var h=-1.6;
  for(var i=0;i<landCenters.length;i++){
    var c=landCenters[i], dx=x-c.x, dz=z-c.z;
    var d2=(dx*dx+dz*dz)/(c.r*c.r);
    h += c.h*Math.exp(-d2*1.35);
  }
  h += Math.sin(x*0.23)*Math.cos(z*0.19)*0.35; // 筆觸起伏
  return h;
}
(function buildTerrain(){
  var seg=110, size=300;
  var geo=new THREE.PlaneGeometry(size,size,seg,seg);
  geo.rotateX(-Math.PI/2);
  var pos=geo.attributes.position;
  var colors=[];
  var cSeaD=new THREE.Color(0x0e2138), cSea=new THREE.Color(0x16324e),
      cSand=new THREE.Color(0x8a6f47), cLand=new THREE.Color(0x3e6b52),
      cHill=new THREE.Color(0x2d4a3c), cPeak=new THREE.Color(0x59503f);
  for(var i=0;i<pos.count;i++){
    var x=pos.getX(i), z=pos.getZ(i);
    var h=heightAt(x,z);
    pos.setY(i, Math.max(h,-0.4));
    var c=new THREE.Color();
    if(h< -0.2) c.copy(cSeaD).lerp(cSea, THREE.MathUtils.clamp((h+1.6)/1.4,0,1));
    else if(h<0.35) c.copy(cSand);
    else if(h<2.2) c.copy(cLand).lerp(cHill,(h-0.35)/1.85);
    else c.copy(cHill).lerp(cPeak, THREE.MathUtils.clamp((h-2.2)/3,0,1));
    // 油畫筆觸：色彩抖動
    var j=(Math.random()-0.5)*0.10;
    c.offsetHSL((Math.random()-0.5)*0.02, j*0.5, j);
    colors.push(c.r,c.g,c.b);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  var mat=new THREE.MeshLambertMaterial({vertexColors:true, flatShading:true});
  var terrain=new THREE.Mesh(geo,mat);
  scene.add(terrain);
  // 海面微光
  var sea=new THREE.Mesh(
    new THREE.PlaneGeometry(320,320),
    new THREE.MeshBasicMaterial({color:0x18365a, transparent:true, opacity:0.35})
  );
  sea.rotation.x=-Math.PI/2; sea.position.y=-0.15;
  scene.add(sea);
})();

/* ---------- 文字貼圖工具 ---------- */
function textSprite(text, opt){
  opt=opt||{};
  var fs=opt.fontSize||46, pad=26;
  var cv=document.createElement("canvas");
  var ctx=cv.getContext("2d");
  var font=(opt.weight||"700")+" "+fs+"px 'Noto Serif TC','Source Han Serif TC','Songti TC','PMingLiU','PingFang TC','Microsoft JhengHei',serif";
  ctx.font=font;
  var w=ctx.measureText(text).width;
  cv.width=Math.ceil(w+pad*2); cv.height=fs+pad*2;
  ctx=cv.getContext("2d");
  if(opt.bg){
    ctx.fillStyle=opt.bg;
    ctx.fillRect(0,0,cv.width,cv.height);
    ctx.strokeStyle=opt.border||"rgba(227,176,75,.6)";
    ctx.lineWidth=3;
    ctx.strokeRect(2,2,cv.width-4,cv.height-4);
  }
  ctx.font=font;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.shadowColor="rgba(0,0,0,.7)"; ctx.shadowBlur=10;
  ctx.fillStyle=opt.color||"#f1e6cf";
  ctx.fillText(text, cv.width/2, cv.height/2);
  var tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=false;
  tex.wrapS=tex.wrapT=THREE.ClampToEdgeWrapping;
  var mat=new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
  var sp=new THREE.Sprite(mat);
  var scale=(opt.scale||0.05);
  sp.scale.set(cv.width*scale, cv.height*scale, 1);
  return sp;
}

function paintingCanvas(kind){
  var cv=document.createElement("canvas"); cv.width=256; cv.height=200;
  var ctx=cv.getContext("2d");
  function dab(x,y,w,h,c,a){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,w,h,Math.random()*3,0,7);ctx.fill();}
  if(kind==="street"){ // 嘉義街外：暖土黃街道、紅瓦、綠樹
    ctx.fillStyle="#c8a86a";ctx.fillRect(0,0,256,200);
    for(var i=0;i<60;i++)dab(Math.random()*256,120+Math.random()*80,18,7,["#b98d4f","#d4b478","#a2743d"][i%3],0.6);
    for(i=0;i<26;i++)dab(Math.random()*256,40+Math.random()*50,16,10,["#a3452a","#8a3a22","#b4543a"][i%3],0.8);
    for(i=0;i<30;i++)dab(Math.random()*256,60+Math.random()*40,14,12,["#3e6b52","#2d5240","#4f7d5c"][i%3],0.75);
    dab(200,30,40,26,"#e8ddc0",0.9);
  }else if(kind==="tamsui"){ // 淡水：紅屋、河口藍
    ctx.fillStyle="#5a7d9c";ctx.fillRect(0,0,256,200);
    for(var j=0;j<50;j++)dab(Math.random()*256,110+Math.random()*90,20,8,["#46688c","#6d90b0","#3a5a7c"][j%3],0.6);
    for(j=0;j<40;j++)dab(Math.random()*256,30+Math.random()*70,15,11,["#a3452a","#c25c36","#7e3620"][j%3],0.8);
    for(j=0;j<18;j++)dab(Math.random()*256,20+Math.random()*40,14,10,"#3e6b52",0.7);
  }else{ // 山川
    ctx.fillStyle="#7f9c8a";ctx.fillRect(0,0,256,200);
    for(var k=0;k<70;k++)dab(Math.random()*256,Math.random()*200,20,10,["#3e6b52","#59503f","#8fae8c","#2d4a3c"][k%4],0.65);
  }
  ctx.globalAlpha=1;
  var tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=false;
  tex.wrapS=tex.wrapT=THREE.ClampToEdgeWrapping;
  return tex;
}
function makePainting(kind, w){
  w=w||7;
  var g=new THREE.Group();
  var frame=new THREE.Mesh(
    new THREE.BoxGeometry(w+0.7,(w*0.78)+0.7,0.3),
    new THREE.MeshLambertMaterial({color:0x8a6a2c})
  );
  var canvasM=new THREE.Mesh(
    new THREE.PlaneGeometry(w,w*0.78),
    new THREE.MeshBasicMaterial({map:paintingCanvas(kind)})
  );
  canvasM.position.z=0.17;
  g.add(frame); g.add(canvasM);
  return g;
}

    lb.position.y=-( (w||7)*0.42 )-1.0;
    p.add(lb);
  }
  scene.add(p); paintings.push(p);
  return p;
}

/* ---------- 相機控制：電影運鏡 + 自由軌道 ---------- */
var camTarget=new THREE.Vector3(-32,2,26);
var sph={r:60, theta:0.6, phi:1.05}; // 半徑、水平角、俯仰
var camState={target:camTarget.clone(), r:sph.r, theta:sph.theta, phi:sph.phi};
var camAnim=null;

function camPosFrom(st){
  return new THREE.Vector3(
    st.target.x + st.r*Math.sin(st.phi)*Math.cos(st.theta),
    st.target.y + st.r*Math.cos(st.phi),
    st.target.z + st.r*Math.sin(st.phi)*Math.sin(st.theta)
  );
}
function applyCam(){
  camera.position.copy(camPosFrom(camState));
  camera.lookAt(camState.target);
}
function ease(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function flyTo(target, r, theta, phi, dur, done){
  var from={target:camState.target.clone(), r:camState.r, theta:camState.theta, phi:camState.phi};
  // 讓水平角走最短路徑
  var dTheta=theta-from.theta;
  while(dTheta>Math.PI)dTheta-=Math.PI*2;
  while(dTheta<-Math.PI)dTheta+=Math.PI*2;
  camAnim={from:from, to:{target:target.clone(), r:r, dTheta:dTheta, phi:phi},
           t:0, dur:REDUCED?300:dur, done:done, arc: from.target.distanceTo(target)>40 ? 30 : 8};
}
function updateCamAnim(dt){
  if(!camAnim) return;
  camAnim.t+=dt;
  var k=Math.min(camAnim.t/camAnim.dur,1);
  var e=ease(k);
  camState.target.lerpVectors(camAnim.from.target, camAnim.to.target, e);
  // 長途飛行時鏡頭抬升，像航拍
  var lift=Math.sin(e*Math.PI)*camAnim.arc;
  camState.r=THREE.MathUtils.lerp(camAnim.from.r, camAnim.to.r, e)+lift;
  camState.theta=camAnim.from.theta + camAnim.to.dTheta*e;
  camState.phi=THREE.MathUtils.lerp(camAnim.from.phi, camAnim.to.phi, e);
  if(k>=1){var cb=camAnim.done; camAnim=null; if(cb)cb();}
}

/* 自由運鏡輸入 */
var freeMode=false, dragging=false, lastX=0,lastY=0, pinchDist=0;
function onDown(x,y){dragging=true;lastX=x;lastY=y;stage.classList.add("grabbing");}
function onMove(x,y){
  if(!dragging)return;
  var dx=x-lastX, dy=y-lastY; lastX=x;lastY=y;
  camAnim=null;
  camState.theta+=dx*0.006;
  camState.phi=THREE.MathUtils.clamp(camState.phi+dy*0.005, 0.18, 1.45);
}
function onUp(){dragging=false;stage.classList.remove("grabbing");}
stage.addEventListener("mousedown",function(e){onDown(e.clientX,e.clientY);});
addEventListener("mousemove",function(e){onMove(e.clientX,e.clientY);});
addEventListener("mouseup",onUp);
stage.addEventListener("wheel",function(e){
  e.preventDefault();
  camAnim=null;
  camState.r=THREE.MathUtils.clamp(camState.r*(1+e.deltaY*0.0012), 12, 240);
},{passive:false});
stage.addEventListener("touchstart",function(e){
  if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);
  else if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    pinchDist=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:true});
stage.addEventListener("touchmove",function(e){
  if(e.touches.length===1)onMove(e.touches[0].clientX,e.touches[0].clientY);
  else if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(pinchDist>0){camAnim=null;camState.r=THREE.MathUtils.clamp(camState.r*(pinchDist/d),12,240);}
    pinchDist=d;
  }
  e.preventDefault();
},{passive:false});
stage.addEventListener("touchend",function(){dragging=false;pinchDist=0;});

function triggerStationFX(i){
  var s=STATIONS[i];
  // 帝展金印 + 嘉義街外升起
  if(s.seal){
    seal.visible=true;
    seal.userData={drop:0};

  });
  if(s.constellation) constellation.visible=true;
  if(s.storm) storm.userData={grow:0};
  if(s.dark){
    inkAnim={t:0};
    lampAnim={t:0};

    setTimeout(function(){ legacyAnim={t:0}; }, REDUCED?600:4200);
  }

  } else {

  }
}
var inkAnim=null, lampAnim=null, legacyAnim=null;

/* ---------- 站點切換 ---------- */
var current=-1, maxUnlocked=0, resolvedChoice={};
function goTo(i){
  if(i<0||i>=STATIONS.length)return;
  current=i;
  var s=STATIONS[i];
  // 時間軸狀態
  STATIONS.forEach(function(st,j){
    st.tlBtn.classList.toggle("active", j===i);
    st.tlBtn.classList.toggle("done", j<i);
  });
  s.tlBtn.scrollIntoView({behavior:REDUCED?"auto":"smooth", inline:"center", block:"nearest"});

  // 敘事卡
  narr.classList.remove("show");
  setTimeout(function(){
    nYear.textContent=s.year;
    nTitle.textContent=s.title;
    nTags.innerHTML=s.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join("");
    nBody.textContent=s.body;
    nSeal.innerHTML=s.seal?('<span class="narr-seal">◆ '+s.seal+'</span>'):"";
    nResult.innerHTML="";
    buildChoices(s,i);
    narr.classList.add("show");
  }, 350);

  setStats(s.stats);
  setMood(s);

  // 運鏡
  var t=s.world.clone(); t.y+=2.5;
  if(s.overview){
    t.set(-10,0,-10);
    flyTo(t, 190, 0.9, 0.35, 6000);
  }else{
    var far=current===0?4500: (s.world.distanceTo(STATIONS[Math.max(i-1,0)].world)>50?5200:3200);
    var theta=camState.theta+ (i%2===0?0.7:-0.7);
    flyTo(t, s.dark?34:(s.mist?26:38), theta, s.seal?0.85:1.02, far);
  }
  triggerStationFX(i);

  prevBtn.disabled=(i===0);
  updateNextBtn();
}
function updateNextBtn(){
  var s=STATIONS[current];
  var locked=s && s.decision && !resolvedChoice[current];
  nextBtn.disabled=(current>=STATIONS.length-1)||locked;
  nextBtn.textContent=current>=STATIONS.length-1?"旅程終點":(locked?"請先做出抉擇":"下一站 ▶");
  if(current+1>maxUnlocked && !locked) maxUnlocked=current+ (current<STATIONS.length-1?1:0);
}
function buildChoices(s,i){
  choiceBtns.innerHTML="";
  if(!s.decision || resolvedChoice[i]){
    choiceWrap.classList.remove("show");
    if(s.decision&&resolvedChoice[i]){
      nResult.innerHTML='<div class="consequence">'+s.decision.b.result+'</div>';
    }
    return;
  }
  choiceWrap.classList.add("show");
  var lbl=choiceWrap.querySelector(".choice-label");
  lbl.textContent=s.decision.q;
  [s.decision.a, s.decision.b].forEach(function(opt){
    var b=document.createElement("button");
    b.className="choice-btn";
    b.innerHTML=opt.label.replace(/\n/g,"<br>");
    b.addEventListener("click",function(){
      if(opt.alt){
        nResult.innerHTML='<div class="alt-note">另一條路：'+opt.note+'</div>';
        b.disabled=true;
      }else{
        resolvedChoice[i]=true;
        choiceBtns.querySelectorAll("button").forEach(function(x){x.disabled=true;});
        b.classList.add("chosen"); b.disabled=false;
        nResult.innerHTML='<div class="consequence">'+opt.result+'</div>';
        choiceWrap.classList.remove("show");
        maxUnlocked=Math.max(maxUnlocked,i+1);
        updateNextBtn();
        // 抉擇後小幅推進能力值以示影響
        var boost=Object.assign({},STATIONS[i].stats);
        boost.belief=Math.min(boost.belief+5,100);
        boost.exp=Math.min(boost.exp+5,100);
        setStats(boost);
      }
    });
    choiceBtns.appendChild(b);
  });
}

/* ---------- 主迴圈 ---------- */
var clock=new THREE.Clock(), elapsed=0;
function animate(){
  requestAnimationFrame(animate);
  var dt=Math.min(clock.getDelta()*1000, 50);
  elapsed+=dt*0.001;

  updateCamAnim(dt);
  updateMood(dt);

  // 站點光球呼吸
  markers.forEach(function(m,idx){
    var pulse=1+Math.sin(elapsed*2.2+idx)*0.12;
    m.userData.halo.scale.setScalar(pulse);
    m.userData.orb.material.color.setHex(idx===current?0xffffff:0xf0cf8a);
    // 1947 之後嘉義起點微光
    if(STATIONS[idx] && STATIONS[idx].dark && inkAnim && inkAnim.t>0.5){
      m.userData.beam.material.opacity=0.25;
    }
  });

  // 旅行光點沿路線流動
  var tt=(elapsed*0.045)%1;
  if(tt<BREAK_T){
    var pp=smooth.getPointAt(tt);
    travelOrb.position.copy(pp);
    travelHalo.position.copy(pp);
    travelOrb.visible=travelHalo.visible=true;
  }else{travelOrb.visible=travelHalo.visible=false;}

  // 畫作浮現與漂浮
  paintings.forEach(function(p){
    if(p.userData.shown){
      p.position.y+=(p.userData.targetY-p.position.y)*0.03;
      p.position.y+=Math.sin(elapsed*1.2+p.userData.floatSeed)*0.006;
      p.rotation.y+=0.0012;
    }
  });

  // 帝展金印落下
  if(seal.visible && seal.userData && seal.userData.drop<1){
    seal.userData.drop=Math.min(seal.userData.drop+dt/1600,1);
    var e=ease(seal.userData.drop);
    seal.position.y=26-e*16; // 落至 y=10
    seal.rotation.z=Math.sin(e*Math.PI)*0.15;
  }
  if(seal.visible){seal.position.y+=Math.sin(elapsed*1.4)*0.004;}

  // 星座閃爍
  if(constellation.visible){
    constellation.children.forEach(function(c,ci2){
      if(c.isMesh)c.material.color.setHSL(0.58,0.5,0.65+Math.sin(elapsed*3+ci2)*0.2);
    });
  }

  // 黑雲聚集
  if(storm.userData && storm.userData.grow<1){
    storm.userData.grow=Math.min(storm.userData.grow+dt/3500,1);
    storm.children.forEach(function(c){c.material.opacity=storm.userData.grow*0.7;});
  }
  if(storm.children[0].material.opacity>0){
    storm.rotation.y+=0.0004;
  }

  // 二二八：墨痕擴散、街燈熄滅
  if(inkAnim){
    inkAnim.t=Math.min(inkAnim.t+dt/5000,1);
    var ie=ease(inkAnim.t)*14;
    ink.scale.set(ie,ie,ie);
  }
  if(lampAnim){
    lampAnim.t=Math.min(lampAnim.t+dt/4000,1);
    lamps.forEach(function(lp,i2){
      var off=lampAnim.t> (i2+1)/7;
      lp.userData.bulb.material.color.setHex(off?0x2a2530:0xffdf9a);
    });
  }
  // 光之延續
  if(legacyAnim){
    legacyAnim.t=Math.min(legacyAnim.t+dt/4500,1);
    legacyBeams.forEach(function(b,bi2){
      var local=THREE.MathUtils.clamp(legacyAnim.t*1.6-bi2*0.08,0,1);
      b.material.opacity=local*0.85*(0.75+Math.sin(elapsed*2+bi2)*0.25);
    });
  }

  // 金塵漂浮
  dust.rotation.y+=0.00025;
  dust.position.y=Math.sin(elapsed*0.4)*0.6;

  applyCam();
  renderer.render(scene,camera);
}

/* 初始鏡頭：高空遠觀 */
camState.target.set(-32,2,26);
camState.r=170; camState.theta=0.5; camState.phi=0.6;
applyCam();
animate();

addEventListener("resize",function(){
  W=innerWidth;H=innerHeight;
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});
})();
</script>
